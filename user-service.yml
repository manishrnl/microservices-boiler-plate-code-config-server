spring:
  application:
    name: user-service

  datasource:
    url: jdbc:postgresql://user-db:5432/userDB
    username: postgres
    password: Manish@2009
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 3

  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: true
    defer-datasource-initialization: true
    properties:
      hibernate:
        format_sql: true

  sql:
    init:
      mode: always
      data-locations: classpath:data.sql

# Your custom properties
my:
  variable: 25
is:
  tracking:
    enabled: false

server:
  port: 8081
  servlet:
    context-path: /users